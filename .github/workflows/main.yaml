name: Testing (X86_64, GPU)

on:
  push:
    branches-ignore:
      - "web"
  pull_request:
    branches-ignore:
      - "web"
  release:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: halo
      - name: Lint
        uses: DoozyX/clang-format-lint-action@v0.11
        with:
          source: "./halo"
          exclude: "./halo/third_party ./halo/external ./halo/ODLA/external"
          clangFormatVersion: 9
          style: file
      - name: Check markdown for broken links
        uses: ruzickap/action-my-markdown-link-checker@v1
        with:
          config_file: ./halo/.github/workflows/mlc_config.json
          exclude: |
            external/
            .github/

  build:
    runs-on: [self-hosted, gpu]
    container:
      image: registry-intl.us-west-1.aliyuncs.com/computation/halo:latest-cuda10.0-cudnn7-ubuntu18.04
      volumes:
        - halo:/src
      options: -user:$():$GID
    steps:
      - name: Install git
        run: add-apt-repository ppa:git-core/ppa -y && apt update && apt install git -y
      - name: Checkout
        uses: actions/checkout@v2
        with:
          path: halo
          submodules: recursive
      - name: Build
        run: |
          mkdir /build && cd /build
          cmake -G Ninja /src
          ninja
      - name: Unit Tests
        run: cd /build && ninja check-halo
      - name: Run Models
        run: cd /build && ninja check-halo-models
      - name: Package
        run: cd /build && ninja package
      - name: Upload
        uses: actions/upload-artifact@v2
        with:
          name: artifact
          path: ${{runner.workspace}}/heterogeneity-aware-lowering-and-optimization/build/*.bz2
          if-no-files-found: error
